<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="roboGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Antena -->
  <line x1="50" y1="25" x2="50" y2="10" stroke="#cbd5e1" stroke-width="3"/>
  <circle cx="50" cy="8" r="4" fill="#f59e0b" filter="url(#glow)"/>
  <!-- Cabeça -->
  <rect x="25" y="25" width="50" height="40" rx="10" fill="url(#roboGrad)"/>
  <rect x="20" y="35" width="5" height="15" rx="2" fill="#94a3b8"/>
  <rect x="75" y="35" width="5" height="15" rx="2" fill="#94a3b8"/>
  <!-- Rosto -->
  <rect x="30" y="30" width="40" height="25" rx="5" fill="#0f172a"/>
  <!-- Olhos -->
  <circle cx="40" cy="40" r="5" fill="#10b981" filter="url(#glow)"/>
  <circle cx="60" cy="40" r="5" fill="#10b981" filter="url(#glow)"/>
  <!-- Boca -->
  <line x1="40" y1="50" x2="60" y2="50" stroke="#10b981" stroke-width="2" stroke-linecap="round"/>
  <!-- Corpo Inferior (Pesçoço/Base) -->
  <path d="M 40 65 L 60 65 L 70 85 L 30 85 Z" fill="url(#roboGrad)"/>
  <circle cx="50" cy="75" r="5" fill="#38bdf8"/>
</svg>
